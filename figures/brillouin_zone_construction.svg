<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- ===================== Panel A ===================== -->
  <rect x="20" y="40" width="400" height="390" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="220" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2a37">Wigner&#8211;Seitz construction of the 1st BZ</text>
  <text x="220" y="86" text-anchor="middle" font-size="12.5" fill="#64748b">(2D square reciprocal lattice)</text>

  <!-- perpendicular bisector lines (dashed) -->
  <g stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5">
    <line x1="170" y1="155" x2="170" y2="325"/>
    <line x1="270" y1="155" x2="270" y2="325"/>
    <line x1="150" y1="190" x2="340" y2="190"/>
    <line x1="150" y1="290" x2="340" y2="290"/>
  </g>

  <!-- first Brillouin zone (enclosed square) -->
  <rect x="170" y="190" width="100" height="100" fill="#14b8a6" fill-opacity="0.18" stroke="#0d9488" stroke-width="2"/>
  <text x="176" y="207" text-anchor="start" font-size="11.5" font-weight="bold" fill="#0f766e">1st BZ</text>

  <!-- G vectors to nearest neighbours -->
  <g stroke="#0f766e" stroke-width="2.2" marker-end="url(#arrow)">
    <line x1="220" y1="240" x2="312" y2="240"/>
    <line x1="220" y1="240" x2="128" y2="240"/>
    <line x1="220" y1="240" x2="220" y2="150"/>
    <line x1="220" y1="240" x2="220" y2="330"/>
  </g>
  <text x="290" y="234" text-anchor="middle" font-size="12.5" font-style="italic" fill="#0f766e">G</text>

  <!-- diagonal (next-nearest) reciprocal points, de-emphasised -->
  <g fill="#cbd5e1">
    <circle cx="120" cy="140" r="5"/><circle cx="320" cy="140" r="5"/>
    <circle cx="120" cy="340" r="5"/><circle cx="320" cy="340" r="5"/>
  </g>
  <!-- nearest reciprocal points -->
  <g fill="#334155">
    <circle cx="120" cy="240" r="5.5"/><circle cx="320" cy="240" r="5.5"/>
    <circle cx="220" cy="140" r="5.5"/><circle cx="220" cy="340" r="5.5"/>
  </g>
  <!-- origin -->
  <circle cx="220" cy="240" r="6.5" fill="#1f2a37"/>
  <text x="208" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2a37">&#915;</text>

  <text x="220" y="406" text-anchor="middle" font-size="12" fill="#475569">Bisect each G vector with a perpendicular plane;</text>
  <text x="220" y="422" text-anchor="middle" font-size="12" fill="#475569">the smallest enclosed cell is the first Brillouin zone.</text>

  <!-- ===================== Panel B ===================== -->
  <rect x="460" y="40" width="400" height="390" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="660" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2a37">Silicon 1st BZ (schematic)</text>
  <text x="660" y="86" text-anchor="middle" font-size="12.5" fill="#64748b">FCC lattice &#8594; BCC reciprocal &#8594; truncated octahedron</text>

  <!-- hexagonal silhouette (flat-top) -->
  <polygon points="765,240 712,149 608,149 555,240 608,331 712,331"
           fill="#14b8a6" fill-opacity="0.10" stroke="#334155" stroke-width="2"/>
  <!-- front square face + connecting edges (3D hint) -->
  <g stroke="#94a3b8" stroke-width="1.4" fill="none">
    <rect x="620" y="202" width="80" height="80"/>
    <line x1="620" y1="202" x2="608" y2="149"/>
    <line x1="700" y1="202" x2="712" y2="149"/>
    <line x1="700" y1="282" x2="712" y2="331"/>
    <line x1="620" y1="282" x2="608" y2="331"/>
  </g>

  <!-- Gamma -> X path with Si conduction-band minimum -->
  <line x1="660" y1="242" x2="726" y2="242" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="5 4"/>
  <circle cx="709" cy="242" r="5.5" fill="none" stroke="#b45309" stroke-width="2.2"/>
  <text x="700" y="222" text-anchor="middle" font-size="11" fill="#b45309">CB min</text>

  <!-- high-symmetry points -->
  <circle cx="660" cy="242" r="6.5" fill="#dc2626"/>
  <text x="648" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">&#915;</text>

  <circle cx="726" cy="242" r="6" fill="#2563eb"/>
  <text x="738" y="247" font-size="13" font-weight="bold" fill="#2563eb">X</text>

  <circle cx="660" cy="175" r="6" fill="#7c3aed"/>
  <text x="672" y="172" font-size="13" font-weight="bold" fill="#7c3aed">L</text>

  <text x="660" y="406" text-anchor="middle" font-size="12" fill="#475569">&#915; centre &#183; X = square-face centre &#183; L = hexagonal-face centre.</text>
  <text x="660" y="422" text-anchor="middle" font-size="12" fill="#475569">CB minimum off-centre along &#915;&#8594;X (about 0.85) &#8594; indirect gap.</text>
</svg>
