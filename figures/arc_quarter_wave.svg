<svg viewBox="0 0 600 330" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker><marker id="arT" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#0f766e"/></marker><marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker><marker id="arO" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#b45309"/></marker><marker id="arB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker></defs><rect x="20" y="40" width="560" height="285" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/><text x="300" y="66" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2a37">Anti-reflective coating (quarter-wave)</text><text x="300" y="84" text-anchor="middle" font-size="12.5" fill="#64748b">n_c = √(n₀ n_s),  thickness d = λ/4n_c</text><rect x="120" y="100" width="360" height="70" fill="#dbeafe" fill-opacity="0.5"/><rect x="120" y="170" width="360" height="30" fill="#14b8a6" fill-opacity="0.30" stroke="#0d9488" stroke-width="1"/><rect x="120" y="200" width="360" height="70" fill="#94a3b8" fill-opacity="0.35"/><text x="474" y="122" text-anchor="end" font-size="12" fill="#1e3a8a">air  n₀</text><text x="474" y="189" text-anchor="end" font-size="12" fill="#0f766e">coating  n_c</text><text x="474" y="230" text-anchor="end" font-size="12" fill="#334155">substrate  n_s (Si)</text><line x1="135" y1="115" x2="186" y2="166" stroke="#b45309" stroke-width="2.4" marker-end="url(#arO)"/><text x="132" y="112" font-size="11" fill="#b45309">incident</text><line x1="190" y1="170" x2="241" y2="115" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arR)"/><text x="244" y="114" font-size="11" fill="#dc2626">r₁</text><line x1="190" y1="170" x2="220" y2="200" stroke="#0f766e" stroke-width="1.6" stroke-dasharray="4 3"/><line x1="220" y1="200" x2="280" y2="95" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arR)"/><text x="282" y="94" font-size="11" fill="#dc2626">r₂</text><text x="300" y="240" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#dc2626">r₁ and r₂ are λ/2 out of phase → destructive interference</text><text x="300" y="316" text-anchor="middle" font-size="12" fill="#475569">Matched index and quarter-wave thickness cancel the reflection.</text></svg>